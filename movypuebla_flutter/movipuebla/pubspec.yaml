name: movipuebla
description: "MovyPuebla - movilidad urbana Puebla"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^8.1.0
  latlong2: ^0.9.1
  http: ^1.2.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  url_launcher: ^6.3.0
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/movypuebla.png
